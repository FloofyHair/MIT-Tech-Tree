100644 --- a//dev/null +++ b/tech_tree.html @@ -0,0 +1,161 @@ +<!DOCTYPE html> +
<html>
    +<head>
        +
        <meta charset="utf-8" />
        +
        <title>MIT Class Tech Tree</title>
        +
        <style>
            +    body { font-family: sans-serif; margin: 20px; }
            +    .row { margin-bottom: 40px; white-space: nowrap; }
            +    .group {
            +      display: inline-block;
            +      margin: 4px 20px 4px 0;
            +      padding: 4px;
            +      border: 1px dashed #ccc;
            +      vertical-align: top;
            +    }
            +    .node {
            +      display: inline-block;
            +      padding: 4px 8px;
            +      margin: 4px;
            +      border: 1px solid #999;
            +      border-radius: 4px;
            +      background: #f9f9f9;
            +    }
            +    svg {
            +      position: absolute;
            +      top: 0;
            +      left: 0;
            +      width: 100%;
            +      height: 100%;
            +      pointer-events: none;
            +    }
            +
        </style>
        +
    </head>
    +
    <body>
        +
        <h1>MIT Class Tech Tree</h1>
        +
        <div id="tree"></div>
        + <svg id="lines"></svg> +
        <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.4/d3.min.js"></script>
        +
        <script>
            +    function parsePrereqs(txt) {
            +      if (!txt) return [];
            +      const matches = txt.match(/\b\d{1,2}\.\d+[A-Z]*\b/g);
            +      return matches ? matches : [];
            +    }
            +
            +    function buildTree(data) {
            +      const nodes = Object.values(data).map(c => ({
            +        code: c.code,
            +        title: c.title,
            +        color: c.color || '#f9f9f9',
            +        prereqs: parsePrereqs(c.prereq_text)
            +      }));
            +
            +      // Build prerequisite graph to determine connected components
            +      const adj = new Map();
            +      nodes.forEach(n => {
            +        if (!adj.has(n.code)) adj.set(n.code, new Set());
            +        n.prereqs.forEach(pr => {
            +          if (!adj.has(pr)) adj.set(pr, new Set());
            +          adj.get(n.code).add(pr);
            +          adj.get(pr).add(n.code);
            +        });
            +      });
            +
            +      const comp = new Map();
            +      let cid = 0;
            +      for (const node of adj.keys()) {
            +        if (comp.has(node)) continue;
            +        const stack = [node];
            +        while (stack.length) {
            +          const v = stack.pop();
            +          if (comp.has(v)) continue;
            +          comp.set(v, cid);
            +          adj.get(v).forEach(nb => stack.push(nb));
            +        }
            +        cid++;
            +      }
            +
            +      const placed = new Map();
            +      const levels = [];
            +      while (nodes.length) {
            +        const level = nodes.filter(n => n.prereqs.every(p => placed.has(p)));
            +        if (level.length === 0) {
            +          level.push(...nodes); // break cycle if any
            +        }
            +        levels.push(level);
            +        level.forEach(n => placed.set(n.code, levels.length - 1));
            +        for (const n of level) {
            +          const idx = nodes.indexOf(n);
            +          if (idx !== -1) nodes.splice(idx, 1);
            +        }
            +      }
            +
            +      const tree = d3.select('#tree');
            +      levels.forEach((level, i) => {
            +        const row = tree.append('div').attr('class', 'row').attr('data-level', i);
            +        const grouped = d3.group(level, n => comp.get(n.code));
            +        grouped.forEach(nodesInGroup => {
            +          const g = row.append('div').attr('class', 'group');
            +          nodesInGroup.forEach(node => {
            +            g.append('div')
            +              .attr('class', 'node')
            +              .attr('id', node.code.replace(/\./g, '_'))
            +              .style('background', node.color)
            +              .text(node.code);
            +          });
            +        });
            +      });
            +
            +      drawLines(levels);
            +    }
            +
            +    function drawLines(levels) {
            +      const svg = d3.select('#lines');
            +      const width = Math.max(document.body.scrollWidth, document.documentElement.scrollWidth);
            +      const height = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight);
            +      svg.attr('width', width).attr('height', height)
            +        .style('width', width + 'px')
            +        .style('height', height + 'px');
            +      const defs = svg.append('defs');
            +      defs.append('marker')
            +        .attr('id', 'arrow')
            +        .attr('viewBox', '0 -5 10 10')
            +        .attr('refX', 8)
            +        .attr('refY', 0)
            +        .attr('markerWidth', 6)
            +        .attr('markerHeight', 6)
            +        .attr('orient', 'auto')
            +        .append('path')
            +        .attr('d', 'M0,-5L10,0L0,5')
            +        .attr('fill', '#999');
            +
            +      levels.forEach(level => {
            +        level.forEach(node => {
            +          const el = document.getElementById(node.code.replace(/\./g, '_'));
            +          const rect = el.getBoundingClientRect();
            +          node.prereqs.forEach(pr => {
            +            const pe = document.getElementById(pr.replace(/\./g, '_'));
            +            if (!pe) return;
            +            const prect = pe.getBoundingClientRect();
            +            svg.append('line')
            +              .attr('x1', prect.left + window.scrollX + prect.width / 2)
            +              .attr('y1', prect.bottom + window.scrollY)
            +              .attr('x2', rect.left + window.scrollX + rect.width / 2)
            +              .attr('y2', rect.top + window.scrollY)
            +              .attr('stroke', '#999')
            +              .attr('marker-end', 'url(#arrow)');
            +          });
            +        });
            +      });
            +    }
            +
            +    fetch('classes.json')
            +      .then(r => r.json())
            +      .then(buildTree)
            +      .catch(err => {
            +        document.getElementById('tree').innerText = 'Failed to load classes.json: ' + err;
            +      });
            +
        </script>
        +
    </body>
    +
</html>
